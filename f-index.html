<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Examination Portal — Alexandria University</title>  
<link rel="icon" type="image/png" href="hacker.png">
<link rel="apple-touch-icon" sizes="180x180" href="hacker.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101827;
    --bg-deep: #0b1220;
    --panel: rgba(19, 30, 48, 0.92);
    --panel-soft: rgba(27, 40, 63, 0.82);
    --border: rgba(148, 163, 184, 0.22);
    --border-strong: rgba(125, 211, 252, 0.38);
    --text: #edf2f7;
    --muted: #9fb0c7;
    --muted-soft: #6f8099;
    --accent: #7dd3fc;
    --accent-strong: #38bdf8;
    --accent-warm: #f8d49b;
    --danger: #fb7185;
    --shadow: rgba(0, 0, 0, 0.32);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at top left, rgba(56,189,248,0.16), transparent 34%),
      radial-gradient(circle at 84% 8%, rgba(248,212,155,0.10), transparent 30%),
      linear-gradient(135deg, var(--bg-deep), var(--bg));
    font-family: 'Cormorant Garamond', serif;
    color: var(--text);
    overflow-x: hidden;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0.48;
  }

  .portal {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 72px;
  }

  .header-crest {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    text-align: center;
    animation: fadeDown 0.75s ease both;
  }

  .crest-ornament {
    font-family: 'DM Mono', monospace;
    font-size: 19px;
    color: var(--accent-warm);
    letter-spacing: 8px;
    margin-bottom: 12px;
    text-shadow: 0 0 22px rgba(248, 212, 155, 0.25);
  }

  .header-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .header-main {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1.5px;
    text-shadow: 0 18px 44px var(--shadow);
  }

  .header-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0 0;
    width: min(420px, 82vw);
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(125,211,252,0.45), transparent);
  }

  .divider-diamond {
    width: 7px;
    height: 7px;
    background: var(--accent-warm);
    transform: rotate(45deg);
    box-shadow: 0 0 16px rgba(248,212,155,0.45);
  }

  .search-container {
    animation: fadeUp 0.8s ease 0.18s both;
    width: 100%;
    max-width: 560px;
    margin-bottom: 34px;
  }

  .search-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.8px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 14px;
    display: block;
  }

  .search-row {
    display: flex;
    border: 1px solid var(--border-strong);
    background: rgba(15, 23, 42, 0.86);
    box-shadow: 0 18px 50px rgba(0,0,0,0.20);
    position: relative;
    overflow: hidden;
    border-radius: 18px;
  }

  .search-row::before {
    content: '';
    position: absolute;
    inset: 0 0 auto;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    pointer-events: none;
  }

  .search-input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    outline: none;
    padding: 18px 22px;
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--text);
    letter-spacing: 3px;
  }

  .search-input::placeholder { color: var(--muted-soft); letter-spacing: 1px; }

  .search-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    border: none;
    cursor: pointer;
    padding: 0 30px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2.5px;
    color: #07111f;
    text-transform: uppercase;
    font-weight: 500;
    transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
  }

  .search-btn:hover { transform: translateY(-1px); filter: brightness(1.08); box-shadow: 0 0 28px rgba(56,189,248,0.26); }

  #results { width: 100%; max-width: 860px; }

  .student-card {
    background: var(--panel);
    border: 1px solid var(--border);
    margin-bottom: 36px;
    animation: slideIn 0.48s ease both;
    position: relative;
    overflow: hidden;
    border-radius: 24px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.25);
    backdrop-filter: blur(12px);
  }

  .student-card::before {
    content: '';
    position: absolute;
    inset: 0 0 auto;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent-warm), transparent);
  }

  .student-header {
    padding: 30px 34px;
    border-bottom: 1px solid rgba(148,163,184,0.12);
    display: flex;
    align-items: flex-start;
    gap: 20px;
  }

  .student-avatar {
    width: 58px;
    height: 58px;
    border: 1px solid rgba(125,211,252,0.38);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent-warm);
    flex-shrink: 0;
    background: rgba(15,23,42,0.72);
  }

  .student-info { flex: 1; min-width: 0; }

  .student-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 4vw, 30px);
    color: var(--text);
    font-weight: 600;
    margin-bottom: 7px;
    line-height: 1.2;
  }

  .student-id-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2.5px;
  }

  .exam-count-badge {
    padding: 8px 14px;
    background: rgba(15,23,42,0.70);
    border: 1px solid rgba(125,211,252,0.22);
    border-radius: 999px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .countdown-section {
    padding: 26px 34px;
    border-bottom: 1px solid rgba(148,163,184,0.12);
    background: linear-gradient(135deg, rgba(14,165,233,0.10), rgba(248,212,155,0.06));
  }

  .countdown-heading {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
  }

  .countdown-copy { min-width: 0; }

  .notify-btn {
    width: 46px;
    height: 46px;
    border-radius: 16px;
    border: 1px solid rgba(148,163,184,0.18);
    background: rgba(15,23,42,0.58);
    color: rgba(159,176,199,0.62);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
    line-height: 1;
    transform-origin: top center;
    transition: color 0.22s, border-color 0.22s, background 0.22s, box-shadow 0.22s, transform 0.22s;
  }

  .notify-btn:hover {
    color: var(--accent-warm);
    border-color: rgba(248,212,155,0.34);
    transform: translateY(-1px) rotate(-5deg);
  }

  .notify-btn.active {
    color: var(--accent-warm);
    border-color: rgba(248,212,155,0.58);
    background: rgba(248,212,155,0.10);
    box-shadow: 0 0 24px rgba(248,212,155,0.26), inset 0 0 18px rgba(248,212,155,0.08);
    animation: bellGlow 1.8s ease-in-out infinite;
  }

  .notify-btn.blocked {
    color: rgba(251,113,133,0.62);
    border-color: rgba(251,113,133,0.24);
    cursor: not-allowed;
  }

  .countdown-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .countdown-subject {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--accent-warm);
    margin-bottom: 18px;
  }

  .countdown-timer { display: flex; gap: 14px; flex-wrap: wrap; }
  .timer-unit { display: flex; flex-direction: column; align-items: center; gap: 7px; }

  .timer-number {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    color: var(--text);
    line-height: 1;
    min-width: 66px;
    text-align: center;
    border: 1px solid rgba(125,211,252,0.24);
    padding: 11px 8px;
    background: rgba(15,23,42,0.72);
    border-radius: 14px;
    letter-spacing: 1px;
  }

  .timer-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted-soft);
  }

  .exam-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 20px;
    padding: 22px 34px;
    border-bottom: 1px solid rgba(148,163,184,0.09);
    transition: background 0.2s;
    position: relative;
  }

  .exam-row:last-child { border-bottom: none; }
  .exam-row:hover { background: rgba(125,211,252,0.05); }
  .exam-row.next-exam { background: rgba(56,189,248,0.08); }
  .exam-row.next-exam::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    bottom: 14px;
    width: 3px;
    border-radius: 0 8px 8px 0;
    background: var(--accent);
    box-shadow: 2px 0 14px rgba(125,211,252,0.35);
  }

  .exam-subject {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: #e7edf7;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .exam-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.7px;
  }

  .exam-room {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent-warm);
    padding: 7px 13px;
    border: 1px solid rgba(248,212,155,0.25);
    background: rgba(15,23,42,0.72);
    border-radius: 999px;
    letter-spacing: 1.4px;
    white-space: nowrap;
    text-align: center;
  }

  .exam-row.past { opacity: 0.46; }
  .exam-row.past .exam-room { color: var(--muted); border-color: rgba(148,163,184,0.16); }

  .next-badge {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #07111f;
    background: var(--accent);
    border-radius: 999px;
    padding: 3px 9px;
    display: inline-block;
    margin-bottom: 7px;
  }

  .not-found, .loading-indicator {
    background: rgba(19,30,48,0.74);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 24px 70px rgba(0,0,0,0.20);
    backdrop-filter: blur(12px);
  }

  .not-found { text-align: center; padding: 52px 24px; animation: fadeUp 0.38s ease both; }
  .not-found-icon { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 2px; margin-bottom: 18px; display: block; }
  .not-found-title { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--text); margin-bottom: 10px; }
  .not-found-sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1.5px; line-height: 1.8; }

  .loading-indicator { display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 46px; animation: fadeUp 0.35s ease both; }
  .loading-dots { display: flex; gap: 10px; }
  .loading-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 999px; animation: pulse 1.2s ease-in-out infinite; box-shadow: 0 0 12px rgba(125,211,252,0.55); }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

  .arrow-anim {
    position: fixed;
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    color: var(--accent-warm);
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    text-shadow: 0 0 16px rgba(248,212,155,0.45);
  }

  @keyframes bellGlow { 0%, 100% { transform: rotate(-4deg); } 50% { transform: rotate(5deg); } }
  @keyframes arrowFly { 0% { opacity: 0; transform: translateX(0) scale(0.4); } 15%, 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(var(--arrow-dx)) scale(1.1); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-24px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pulse { 0%, 100% { opacity: 0.35; transform: scale(0.72); } 50% { opacity: 1; transform: scale(1.24); } }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<div class="portal">
  <div class="header-crest">
    <div class="crest-ornament">{ } // &lt;/&gt;</div>
    <div class="header-title">Faculty of Computers and Information Technology</div>
    <div class="header-main">Examination Portal</div>
    <div class="header-sub">Alexandria University &nbsp;·&nbsp; 2026</div>
    <div class="divider"><div class="divider-line"></div><div class="divider-diamond"></div><div class="divider-line"></div></div>
  </div>

  <div class="search-container">
    <span class="search-label"> F o c u s -- c a r e f u l l y</span>
    <div class="search-row">
      <input class="search-input" type="text" id="id-input" placeholder="ENTER YOUR ID" inputmode="numeric" maxlength="10" autocomplete="off" />
      <button class="search-btn" id="search-btn">Search</button>
    </div>
  </div>

  <div id="results"></div>
</div>

<div class="arrow-anim" id="arrow-anim">—&gt;</div>

<script>
const DATA_URLS = [
  'SUCCESS_DATA.txt',
  './SUCCESS_DATA.txt',
  'https://raw.githubusercontent.com/final-26/final-exam-alex/main/SUCCESS_DATA.txt'
];
const SERVICE_WORKER_URL = 'sw.js';
const EXAM_SYNC_TAG = 'exam-notification-check';

let studentsData = null;
let timerInterval = null;
let notificationInterval = null;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
}

function normalizeId(value) {
  const arabic = '٠١٢٣٤٥٦٧٨٩';
  const eastern = '۰۱۲۳۴۵۶۷۸۹';
  return String(value ?? '')
    .trim()
    .replace(/[٠-٩]/g, d => arabic.indexOf(d))
    .replace(/[۰-۹]/g, d => eastern.indexOf(d))
    .replace(/[^0-9]/g, '');
}

function normalizeSubjectName(subject) {
  const clean = String(subject || '').trim();
  const aliases = new Map([
    ['Intro. to Oper. Research&Deci.Sup.sys.', 'Intro to OR'],
    ['Machine Learn. Fund.', 'Machine Learning']
  ]);
  return aliases.get(clean) || clean;
}

function getExamKey(student, exam) {
  return [student.id, exam.subject, exam.date, exam.timeStart].join('|');
}

function getNotifyKey(student, exam) {
  return `examNotify:${getExamKey(student, exam)}`;
}

function getDaysRemaining(exam) {
  return Math.max(0, Math.floor((toTs(exam) - Date.now()) / 86400000));
}

function getNotificationState(student, exam) {
  try {
    return JSON.parse(localStorage.getItem(getNotifyKey(student, exam)) || 'null');
  } catch {
    return null;
  }
}

function setNotificationState(student, exam, state) {
  try {
    localStorage.setItem(getNotifyKey(student, exam), JSON.stringify(state));
  } catch {
    // Browser storage can be unavailable in private or restricted contexts.
  }
}

function clearNotificationState(student, exam) {
  try {
    localStorage.removeItem(getNotifyKey(student, exam));
  } catch {
    // Browser storage can be unavailable in private or restricted contexts.
  }
}

function canSendNotifications() {
  return 'Notification' in window && Notification.permission === 'granted';
}

function parseData(text) {
  const students = {};
  const normalized = String(text || '').replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
  const blocks = normalized
    .split(/^={20,}\s*$/m)
    .map(block => block.trim())
    .filter(Boolean);

  for (const block of blocks) {
    const lines = block.split('\n').map(line => line.trim()).filter(Boolean);
    const idLine = lines.find(line => /^Student\s*ID\s*:/i.test(line));
    if (!idLine) continue;

    const nameLine = lines.find(line => /^Name\s*:/i.test(line));
    const facultyLine = lines.find(line => /^Faculty\s*:/i.test(line));
    const id = normalizeId(idLine.replace(/^Student\s*ID\s*:/i, ''));
    if (!id) continue;

    const examIdx = lines.findIndex(line => /^Exam\s*Table\s*:/i.test(line));
    const exams = [];

    if (examIdx !== -1) {
      for (let i = examIdx + 1; i < lines.length; i++) {
        const line = lines[i];
        if (!line || /^No\s+data$/i.test(line)) continue;

        const parts = line.split('|').map(part => part.trim());
        if (parts.length < 4 || !parts[0] || !parts[1]) continue;

        const fullRoom = parts[4] || '';
        const cleanRoom = parts[5] || fullRoom.replace(/^Alexandria\/floor\d+\//i, '');
        exams.push({
          subject: normalizeSubjectName(parts[0]),
          date: parts[1],
          timeStart: normalizeTime(parts[2]),
          timeEnd: normalizeTime(parts[3]),
          room: (cleanRoom || fullRoom || '—').trim()
        });
      }
    }

    exams.sort((a, b) => toTs(a) - toTs(b));
    students[id] = {
      id,
      name: nameLine ? nameLine.replace(/^Name\s*:/i, '').trim() : 'Unknown',
      faculty: facultyLine ? facultyLine.replace(/^Faculty\s*:/i, '').trim() : 'Faculty of Computers and Information Technology',
      exams
    };
  }

  return students;
}

function normalizeTime(time) {
  return String(time || '').replace(/\s*:\s*/g, ':').replace(/\s+/g, ' ').trim();
}

function parseExamDate(dateStr, timeStr) {
  if (!dateStr) return Infinity;
  const parts = String(dateStr).trim().split('/').map(Number);
  if (parts.length < 3 || parts.some(Number.isNaN)) return Infinity;
  const [d, m, y] = parts;
  const tp = normalizeTime(timeStr).replace(/\s+/g, '').match(/^(\d{1,2}):(\d{2})(AM|PM)$/i);
  if (!tp) return new Date(y, m - 1, d, 14, 0).getTime();
  let h = Number(tp[1]);
  const min = Number(tp[2]);
  const ampm = tp[3].toUpperCase();
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return new Date(y, m - 1, d, h, min).getTime();
}

function toTs(exam) { return parseExamDate(exam.date, exam.timeStart); }
function pad(n) { return String(Math.max(0, n)).padStart(2, '0'); }

function formatDate(dateStr) {
  if (!dateStr) return '';
  const [d, m, y] = String(dateStr).split('/').map(Number);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dt = new Date(y, m - 1, d);
  return `${days[dt.getDay()]}, ${d} ${months[m - 1]} ${y}`;
}

async function loadData() {
  if (studentsData) return true;
  showLoading();

  for (const url of DATA_URLS) {
    try {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const parsed = parseData(text);
      if (!Object.keys(parsed).length) throw new Error('No student records parsed');
      studentsData = parsed;
      console.log(`Loaded ${Object.keys(studentsData).length} students from ${url}`);
      return true;
    } catch (error) {
      console.warn(`Failed to load ${url}:`, error);
    }
  }

  studentsData = {};
  showError('Failed to load data. Run the portal through a local server and keep SUCCESS_DATA.txt beside f-index.html.');
  return false;
}

function getNextExam(exams) {
  const now = Date.now();
  return exams.find(exam => toTs(exam) > now) || null;
}

function startCountdown(exam, containerId) {
  if (timerInterval) clearInterval(timerInterval);
  function update() {
    const el = document.getElementById(containerId);
    if (!el) { clearInterval(timerInterval); return; }
    const diff = toTs(exam) - Date.now();
    if (diff <= 0) {
      clearInterval(timerInterval);
      el.innerHTML = '<span style="color:var(--accent-warm);letter-spacing:2px;font-family:\'DM Mono\',monospace;font-size:12px">[ EXAM IN PROGRESS ]</span>';
      return;
    }
    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);
    el.innerHTML = ['Days','Hours','Minutes','Seconds'].map((label, i) => {
      const val = [days, hrs, mins, secs][i];
      return `<div class="timer-unit"><div class="timer-number">${pad(val)}</div><div class="timer-label">${label}</div></div>`;
    }).join('');
  }
  update();
  timerInterval = setInterval(update, 1000);
}

function renderStudent(student) {
  const results = document.getElementById('results');
  if (timerInterval) clearInterval(timerInterval);
  if (notificationInterval) clearInterval(notificationInterval);
  results.innerHTML = '';

  if (!student.exams || student.exams.length === 0) {
    results.innerHTML = `<div class="not-found"><span class="not-found-icon">// no records found</span><div class="not-found-title">No Examinations Registered</div><div class="not-found-sub">no_exam_data for ID: ${escapeHtml(student.id)}</div></div>`;
    return;
  }

  const initials = student.name.split(/\s+/).slice(0, 2).map(word => word[0] || '').join('').toUpperCase() || '??';
  const nextExam = getNextExam(student.exams);
  const now = Date.now();
  const countdownHTML = nextExam ? `<div class="countdown-section"><div class="countdown-heading"><div class="countdown-copy"><div class="countdown-label">// next exam — time remaining</div><div class="countdown-subject">${escapeHtml(nextExam.subject)}</div></div><button class="notify-btn" id="notify-btn" type="button" aria-label="Enable exam notifications" title="Enable exam notifications">🔔</button></div><div class="countdown-timer" id="timer-display"></div></div>` : '';

  const examsHTML = student.exams.map(exam => {
    const isPast = toTs(exam) < now;
    const isNext = nextExam && exam === nextExam;
    return `<div class="exam-row${isPast ? ' past' : ''}${isNext ? ' next-exam' : ''}"><div>${isNext ? '<div class="next-badge">▶ next</div>' : ''}<div class="exam-subject">${escapeHtml(exam.subject)}</div><div class="exam-date">${escapeHtml(formatDate(exam.date))} &nbsp;·&nbsp; ${escapeHtml(exam.timeStart)} &ndash; ${escapeHtml(exam.timeEnd)}</div></div><div class="exam-room">${escapeHtml(exam.room || '—')}</div></div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'student-card';
  card.innerHTML = `<div class="student-header"><div class="student-avatar">${escapeHtml(initials)}</div><div class="student-info"><div class="student-name">${escapeHtml(student.name)}</div><div class="student-id-badge">ID_${escapeHtml(student.id)}</div></div><div class="exam-count-badge">${student.exams.length}&nbsp;exam${student.exams.length !== 1 ? 's' : ''}</div></div>${countdownHTML}<div class="exams-list">${examsHTML}</div>`;
  results.appendChild(card);
  if (nextExam) {
    startCountdown(nextExam, 'timer-display');
    setupExamNotifications(student, nextExam);
  }
}

function updateNotifyButton(button, active) {
  button.classList.toggle('active', active);
  button.classList.toggle('blocked', 'Notification' in window && Notification.permission === 'denied');
  button.setAttribute('aria-pressed', String(active));
  button.setAttribute('aria-label', active ? 'Disable exam notifications' : 'Enable exam notifications');
  button.title = active ? 'Notifications are enabled' : 'Enable exam notifications';
}

function sendExamNotification(student, exam, days) {
  if (!canSendNotifications()) return;
  const dayText = days > 0 ? `${days} من الأيام` : 'أقل من يوم';
  new Notification(student.name, {
    body: `متنساش انه باقي ${dayText} على امتحان ${exam.subject}`,
    tag: getExamKey(student, exam),
    renotify: true
  });
}

function checkExamNotification(student, exam) {
  const state = getNotificationState(student, exam);
  if (!state || !state.active) return;

  const days = getDaysRemaining(exam);
  if (days < state.lastDays) {
    sendExamNotification(student, exam, days);
    setNotificationState(student, exam, { active: true, lastDays: days });
  }
}

function setupExamNotifications(student, exam) {
  const button = document.getElementById('notify-btn');
  if (!button) return;

  let state = getNotificationState(student, exam);
  updateNotifyButton(button, Boolean(state && state.active));
  if (state && state.active) syncNotificationWithWorker(student, exam, true);

  if (!('Notification' in window)) {
    button.classList.add('blocked');
    button.title = 'Notifications are not supported in this browser';
    return;
  }

  button.addEventListener('click', async () => {
    state = getNotificationState(student, exam);

    if (state && state.active) {
      clearNotificationState(student, exam);
      syncNotificationWithWorker(student, exam, false);
      updateNotifyButton(button, false);
      return;
    }

    const permission = Notification.permission === 'default'
      ? await Notification.requestPermission()
      : Notification.permission;

    if (permission !== 'granted') {
      updateNotifyButton(button, false);
      return;
    }

    setNotificationState(student, exam, { active: true, lastDays: getDaysRemaining(exam) });
    syncNotificationWithWorker(student, exam, true);
    updateNotifyButton(button, true);
  });

  notificationInterval = setInterval(() => checkExamNotification(student, exam), 60000);
  checkExamNotification(student, exam);
}

async function getServiceWorkerRegistration() {
  if (!('serviceWorker' in navigator)) return null;
  try {
    return (await navigator.serviceWorker.getRegistration()) || await registerExamServiceWorker();
  } catch (error) {
    console.warn('Service worker is not ready:', error);
    return null;
  }
}

async function registerExamServiceWorker() {
  if (!('serviceWorker' in navigator)) return null;

  try {
    const registration = await navigator.serviceWorker.register(SERVICE_WORKER_URL, { scope: './' });
    registration.update();

    if ('periodicSync' in registration) {
      try {
        await registration.periodicSync.register(EXAM_SYNC_TAG, { minInterval: 60 * 60 * 1000 });
      } catch (error) {
        console.warn('Periodic background sync unavailable:', error);
      }
    }
    return registration;
  } catch (error) {
    console.warn('Service worker registration failed:', error);
    return null;
  }
}

async function requestOneShotSync(registration) {
  if (!registration || !('sync' in registration)) return;
  try {
    await registration.sync.register(EXAM_SYNC_TAG);
  } catch (error) {
    console.warn('One-shot background sync unavailable:', error);
  }
}

async function syncNotificationWithWorker(student, exam, active) {
  let registration = await getServiceWorkerRegistration();
  if (!registration) return;

  if (!registration.active && 'serviceWorker' in navigator) {
    registration = await navigator.serviceWorker.ready;
  }
  if (!registration.active) return;

  registration.active.postMessage({
    type: active ? 'UPSERT_EXAM_NOTIFICATION' : 'REMOVE_EXAM_NOTIFICATION',
    payload: {
      key: getExamKey(student, exam),
      studentName: student.name,
      subject: exam.subject,
      examTs: toTs(exam),
      lastDays: getDaysRemaining(exam),
      active
    }
  });

  if (active) requestOneShotSync(registration);
}

function showLoading() {
  document.getElementById('results').innerHTML = `<div class="loading-indicator"><div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div><div class="loading-text">fetching academic records...</div></div>`;
}

function showNotFound(id) {
  const known = studentsData ? Object.keys(studentsData).slice(0, 5).join(', ') : '';
  document.getElementById('results').innerHTML = `<div class="not-found"><span class="not-found-icon">// 404 not_found</span><div class="not-found-title">Student Not Found</div><div class="not-found-sub">no records match ID: ${escapeHtml(id)}${known ? `<br>examples: ${escapeHtml(known)}` : ''}</div></div>`;
}

function showError(msg) {
  document.getElementById('results').innerHTML = `<div class="not-found"><span class="not-found-icon">// error</span><div class="not-found-title">Connection Failed</div><div class="not-found-sub">${escapeHtml(msg)}</div></div>`;
}

async function doSearch(id) {
  const cleanId = normalizeId(id);
  if (!cleanId) return;
  if (!studentsData) {
    const ok = await loadData();
    if (!ok) return;
  }
  const student = studentsData[cleanId];
  student ? renderStudent(student) : showNotFound(cleanId);
}

function fireArrow(onDone) {
  const inputEl = document.getElementById('id-input');
  const rect = inputEl.getBoundingClientRect();
  const arrow = document.getElementById('arrow-anim');
  const startX = rect.left + 18;
  const startY = rect.top + rect.height / 2 - 14;
  const dx = Math.max(72, rect.width - 58);

  arrow.style.left = `${startX}px`;
  arrow.style.top = `${startY}px`;
  arrow.style.setProperty('--arrow-dx', `${dx}px`);
  arrow.style.animation = 'none';
  void arrow.offsetHeight;
  arrow.style.animation = 'arrowFly 0.48s cubic-bezier(0.4,0,0.2,1) forwards';

  setTimeout(() => {
    inputEl.value = '';
  }, 140);
  setTimeout(onDone, 480);
}

function runSearch() {
  const id = normalizeId(document.getElementById('id-input').value);
  if (!id) return;
  showLoading();
  fireArrow(() => doSearch(id));
}

document.getElementById('search-btn').addEventListener('click', runSearch);
document.getElementById('id-input').addEventListener('keydown', event => {
  if (event.key === 'Enter') runSearch();
});

(function initBackground() {
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let width;
  let height;
  const cols = [];
  const nodes = [];
  const edges = [];
  const chars = '01ABCDEF{}[]<>/\\;:=+-*';

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    initCols();
    initNodes();
  }

  function initCols() {
    cols.length = 0;
    const colW = 26;
    const count = Math.floor(width / colW);
    for (let i = 0; i < count; i++) {
      cols.push({ x: i * colW + colW / 2, y: Math.random() * -height, speed: 0.25 + Math.random() * 0.42, len: Math.floor(6 + Math.random() * 12), chars: Array.from({ length: 18 }, () => chars[Math.floor(Math.random() * chars.length)]), swapTimer: 0 });
    }
  }

  function initNodes() {
    nodes.length = 0;
    edges.length = 0;
    const count = Math.floor((width * height) / 76000);
    for (let i = 0; i < count; i++) nodes.push({ x: Math.random() * width, y: Math.random() * height, r: 1.4 + Math.random() * 2, pulse: Math.random() * Math.PI * 2, speed: 0.006 + Math.random() * 0.01 });
    const distLimit = 170;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        if (Math.sqrt(dx * dx + dy * dy) < distLimit) edges.push([i, j]);
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = '#0b1220';
    ctx.fillRect(0, 0, width, height);

    ctx.strokeStyle = 'rgba(125,211,252,0.035)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < width; x += 58) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
    for (let y = 0; y < height; y += 58) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }

    for (const [i, j] of edges) {
      const a = nodes[i];
      const b = nodes[j];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      ctx.strokeStyle = `rgba(125,211,252,${(1 - dist / 170) * 0.10})`;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }

    for (const node of nodes) {
      node.pulse += node.speed;
      const alpha = 0.16 + 0.16 * Math.sin(node.pulse);
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(248,212,155,${alpha})`;
      ctx.fill();
    }

    ctx.font = '12px "DM Mono", monospace';
    for (const col of cols) {
      col.y += col.speed;
      col.swapTimer++;
      if (col.swapTimer > 12) {
        col.swapTimer = 0;
        col.chars[Math.floor(Math.random() * col.chars.length)] = chars[Math.floor(Math.random() * chars.length)];
      }
      for (let k = 0; k < col.len; k++) {
        const charY = col.y - k * 17;
        if (charY < -17 || charY > height + 17) continue;
        const alpha = k === 0 ? 0.55 : Math.max(0, (1 - k / col.len)) * 0.12;
        ctx.fillStyle = k === 0 ? `rgba(237,242,247,${alpha})` : `rgba(125,211,252,${alpha})`;
        ctx.fillText(col.chars[k % col.chars.length], col.x - 5, charY);
      }
      if (col.y - col.len * 17 > height) {
        col.y = Math.random() * -220;
        col.speed = 0.25 + Math.random() * 0.42;
        col.len = Math.floor(6 + Math.random() * 12);
      }
    }

    requestAnimationFrame(draw);
  }

  resize();
  draw();
  window.addEventListener('resize', resize);
})();

registerExamServiceWorker();
window.addEventListener('online', async () => {
  const registration = await getServiceWorkerRegistration();
  requestOneShotSync(registration);
});
loadData();
</script>
